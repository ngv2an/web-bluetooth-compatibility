<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Compatibility</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <div class="table-scroll">
    <table>
      <thead>
        <tr>
          <th class="corner">OS \ Browser</th>
          <th>
            <div class="browser-head">
              <!-- Chrome logo -->
              <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
                <circle cx="24" cy="24" r="22" fill="#fff"/>
                <path fill="#e53935" d="M24 4a20 20 0 0 1 17.3 10H24a10 10 0 0 0-8.66 5L9.4 8.6A19.9 19.9 0 0 1 24 4z"/>
                <path fill="#4caf50" d="M6.7 12.9 15.34 27a10 10 0 0 0 8.66 5l-6.13 10.62A20 20 0 0 1 6.7 12.9z"/>
                <path fill="#ffc107" d="M44 24a20 20 0 0 1-26.13 18.62L26 28a10 10 0 0 0 7.6-14H44a20 20 0 0 1 0 10z"/>
                <circle cx="24" cy="24" r="8" fill="#1976d2"/>
              </svg>
              <span>Chrome</span>
            </div>
          </th>
          <th>
            <div class="browser-head">
              <!-- Firefox logo -->
              <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
                <circle cx="24" cy="24" r="20" fill="#ff7139"/>
                <path fill="#ffb822" d="M24 6c8 2 13 9 13 17 0 9-7 16-15 16-8 0-14-6-14-14 0-5 3-9 7-10-2 4 0 8 4 8 3 0 5-2 5-5 0-4-3-6-3-10 0-3 2-5 3-2z"/>
              </svg>
              <span>Firefox</span>
            </div>
          </th>
          <th>
            <div class="browser-head">
              <!-- Opera logo -->
              <svg class="logo" viewBox="0 0 48 48" aria-hidden="true">
                <ellipse cx="24" cy="24" rx="20" ry="20" fill="#ff1b2d"/>
                <ellipse cx="24" cy="24" rx="8" ry="13" fill="#fff"/>
              </svg>
              <span>Opera</span>
            </div>
          </th>
          <th>
            <div class="browser-head">
              <span>Other</span>
            </div>
          </th>
        </tr>
      </thead>
      <tbody id="compatibility-body"></tbody>
    </table>
  </div>

  <div class="legend">
    <span><span class="badge yes">Supported</span> — Web Bluetooth khả dụng</span>
    <span><span class="badge no">Not Supported</span> — Không hỗ trợ Web Bluetooth</span>
  </div>

</div>
<script src="script.js" defer></script>
</body>
</html>
